   path:[

const SEG_COLOR={A:'#4a8fd4',B:'#3fa87a',C:'#c87a3a',D:'#c87a3a'};
const CONF_COLOR={high:'#e24b4a',mid:'#ef9f27',ref:'#c8d850'};
const CONF_LABEL={high:'고신뢰 이상',mid:'중신뢰 이상',ref:'참고 이상'};
const PAT_LABEL={1:'패턴 1 · 방향 역전/시차 이탈',2:'패턴 2 · 전이율 이탈/비대칭',3:'패턴 3 · 안정기 스프레드 확대'};

let currentComm='wheat';
let currentView='stream';
let commOpen=false;
let hoveredAnomaly=null;
let selectedAnomaly=null;
let animProgress=0;
let animFrame=null;
let scatterSeg='A';
let streamData=null;
let scatterData=null;
let anomalyScreenPos=[];
let scatterScreenPos=[];

const sc=document.getElementById('stream-canvas');
const xc=document.getElementById('scatter-canvas');
const sctx=sc.getContext('2d');
const xctx=xc.getContext('2d');

function resizeCanvases(){
  const wrap=document.getElementById('chart-wrap');
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  [sc,xc].forEach(c=>{c.width=W*devicePixelRatio;c.height=H*devicePixelRatio;c.style.width=W+'px';c.style.height=H+'px';});
  [sctx,xctx].forEach(c=>c.scale(devicePixelRatio,devicePixelRatio));
  return{W,H};
}

function seededRand(seed){
  let s=seed%2147483647;if(s<=0)s+=2147483646;
  return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};
}

function makeStreamData(commId){
  const r=seededRand(commId.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  const years=[];
  for(let y=2004;y<=2026;y++) for(let m=1;m<=12;m++) years.push({y,m,t:y+(m-1)/12});
  const segs=['A','B','D'];
  const curves={};
  segs.forEach((seg,si)=>{
    let v=0.5+si*0.15;
    curves[seg]=years.map(({t})=>{
      const drift=Math.sin(t*0.4+si*2.1)*0.18+Math.sin(t*0.13+si)*0.22;
      v=0.3+si*0.18+drift+r()*0.06-0.03;
      return Math.max(0.05,Math.min(0.95,v));
    });
  });
  ANOMALIES.forEach(a=>{
    const idx=(a.year-2004)*12+(a.month-1);
    if(idx>=0&&idx<years.length&&curves[a.seg]){
      const spike=a.conf==='high'?0.35:a.conf==='mid'?0.22:0.14;
      curves[a.seg][idx]=Math.min(0.97,curves[a.seg][idx]+spike);
      if(idx>0) curves[a.seg][idx-1]=Math.min(0.9,curves[a.seg][idx-1]+spike*0.4);
      if(idx<years.length-1) curves[a.seg][idx+1]=Math.min(0.9,curves[a.seg][idx+1]+spike*0.3);
    }
  });
  return{years,curves};
}

function drawStream(progress=1){
  const wrap=document.getElementById('chart-wrap');
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  const ctx=sctx;
  ctx.clearRect(0,0,W,H);
  if(!streamData) streamData=makeStreamData(currentComm);
  const{years,curves}=streamData;
  const PAD={l:48,r:16,t:20,b:32};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const N=Math.floor(years.length*progress);
  const xScale=i=>PAD.l+i/years.length*cW;
  const yScale=v=>PAD.t+cH-(v*cH*0.72+cH*0.14);

  ctx.fillStyle='#09090f';ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let y=2004;y<=2026;y+=2){
    const xi=xScale((y-2004)*12);
    ctx.beginPath();ctx.moveTo(xi,PAD.t);ctx.lineTo(xi,PAD.t+cH);ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+cH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t+cH);ctx.lineTo(PAD.l+cW,PAD.t+cH);ctx.stroke();

  ctx.fillStyle='#333';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';
  ['낮음','','높음'].forEach((lbl,i)=>{ctx.fillText(lbl,PAD.l-5,PAD.t+cH-i*cH*0.43+4);});
  ctx.textAlign='center';
  for(let y=2006;y<=2026;y+=4){
    const xi=PAD.l+(y-2004)*12/years.length*cW;
    ctx.fillText(y,xi,PAD.t+cH+16);
  }
  ctx.save();ctx.translate(12,PAD.t+cH/2);ctx.rotate(-Math.PI/2);
  ctx.fillStyle='#2a2a3a';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
  ctx.fillText('전이율',0,0);ctx.restore();

  const segOrder=['D','B','A'];
  segOrder.forEach(seg=>{
    const vals=curves[seg];if(!vals) return;
    const col=SEG_COLOR[seg]||'#666';
    ctx.beginPath();ctx.moveTo(xScale(0),PAD.t+cH);
    for(let i=0;i<N;i++) ctx.lineTo(xScale(i),yScale(vals[i]));
    ctx.lineTo(xScale(N-1),PAD.t+cH);ctx.closePath();
    const grad=ctx.createLinearGradient(0,PAD.t,0,PAD.t+cH);
    grad.addColorStop(0,col+'28');grad.addColorStop(1,col+'04');
    ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.moveTo(xScale(0),yScale(vals[0]));
    for(let i=1;i<N;i++){
      const x0=xScale(i-1),y0=yScale(vals[i-1]),x1=xScale(i),y1=yScale(vals[i]);
      ctx.bezierCurveTo(x0+(x1-x0)/2,y0,x0+(x1-x0)/2,y1,x1,y1);
    }
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  });

  const events=[
    {y:2008,label:'금융위기',col:'rgba(200,90,40,.06)'},
    {y:2020,label:'COVID-19',col:'rgba(40,140,90,.06)'},
    {y:2022,label:'우크라이나',col:'rgba(200,50,50,.07)'},
  ];
  events.forEach(ev=>{
    const x0=PAD.l+(ev.y-2004)*12/years.length*cW;
    const x1=PAD.l+(ev.y-2004+1.2)*12/years.length*cW;
    ctx.fillStyle=ev.col;ctx.fillRect(x0,PAD.t,x1-x0,cH);
    if(progress>0.7){
      ctx.fillStyle='#2a2a3a';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillText(ev.label,x0+(x1-x0)/2,PAD.t+9);
    }
  });

  anomalyScreenPos=[];
  ANOMALIES.forEach(a=>{
    const idx=(a.year-2004)*12+(a.month-1);
    if(idx>=N||!curves[a.seg]) return;
    const x=xScale(idx),y=yScale(curves[a.seg][idx]);
    const r=a.conf==='high'?7:a.conf==='mid'?5.5:4;
    const col=CONF_COLOR[a.conf];
    const isHov=hoveredAnomaly===a,isSel=selectedAnomaly===a;
    if(a.conf==='high'||isHov||isSel){
      const g=ctx.createRadialGradient(x,y,0,x,y,r*3);
      g.addColorStop(0,col+'44');g.addColorStop(1,col+'00');
      ctx.beginPath();ctx.arc(x,y,r*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();ctx.arc(x,y,isHov||isSel?r*1.5:r,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();
    if(isHov||isSel){
      ctx.beginPath();ctx.arc(x,y,(isHov?r*1.5:r)+2.5,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
    }
    anomalyScreenPos.push({a,x,y,r:r+5});
  });
}

function makeScatterData(seg){
  const r=seededRand(currentComm.split('').reduce((a,c)=>a+c.charCodeAt(0),0)+seg.charCodeAt(0)*31);
  const pts=[];
  for(let i=0;i<140;i++){
    const up=(r()-0.5)*0.6;
    const dn=up+(r()-0.5)*0.18;
    pts.push({up,dn,anom:null});
  }
  ANOMALIES.filter(a=>a.seg===seg).forEach(a=>{
    const up=a.conf==='high'?0.55+r()*0.2:a.conf==='mid'?0.35+r()*0.2:0.25+r()*0.15;
    const asymm=a.pat===2?(r()>0.5?0.35:-0.35)*up:0;
    const dn=a.conf==='high'?up*0.4+asymm+r()*0.1:up*0.55+asymm+r()*0.1;
    pts.push({up,dn,anom:a});
  });
  return pts;
}

function drawScatter(seg){
  const wrap=document.getElementById('chart-wrap');
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  const ctx=xctx;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#09090f';ctx.fillRect(0,0,W,H);
  if(!scatterData) scatterData=makeScatterData(seg);
  const pts=scatterData;
  const PAD={l:48,r:16,t:24,b:40};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const ext=0.85;
  const xS=v=>PAD.l+(v+ext)/(ext*2)*cW;
  const yS=v=>PAD.t+cH-(v+ext)/(ext*2)*cH;

  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;
  [-0.5,0,0.5].forEach(v=>{
    ctx.beginPath();ctx.moveTo(xS(v),PAD.t);ctx.lineTo(xS(v),PAD.t+cH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.l,yS(v));ctx.lineTo(PAD.l+cW,yS(v));ctx.stroke();
  });
  ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,yS(0));ctx.lineTo(PAD.l+cW,yS(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(xS(0),PAD.t);ctx.lineTo(xS(0),PAD.t+cH);ctx.stroke();

  const grad=ctx.createLinearGradient(xS(-ext),yS(-ext),xS(ext),yS(ext));
  grad.addColorStop(0,'rgba(107,159,255,0)');
  grad.addColorStop(0.5,'rgba(107,159,255,0.3)');
  grad.addColorStop(1,'rgba(107,159,255,0)');
  ctx.beginPath();ctx.moveTo(xS(-ext),yS(-ext));ctx.lineTo(xS(ext),yS(ext));
  ctx.strokeStyle=grad;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);

  ctx.fillStyle='#2a4060';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
  ctx.fillText('정상 전달 기준선',xS(0.42),yS(0.52));

  ctx.fillStyle='rgba(226,75,74,0.2)';ctx.fillRect(xS(0.04),PAD.t,cW/2,cH/2);
  ctx.fillStyle='rgba(239,159,39,0.08)';ctx.fillRect(PAD.l,yS(0),cW/2,cH/2);
  ctx.fillStyle='rgba(226,75,74,0.45)';ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillText('과대 전달 (상류↑→하류↑↑)',xS(0.07),PAD.t+14);
  ctx.fillStyle='rgba(239,159,39,0.6)';ctx.textAlign='right';
  ctx.fillText('깃털 (상류↓→하류 무반응)',xS(-0.04),yS(-0.07));

  ctx.fillStyle='#333';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
  const segLabel=seg==='A'?'국제가→수입단가':seg==='B'?'수입단가→PPI':'PPI→CPI';
  ctx.fillText(`상류 가격 변화율 (${segLabel})`,PAD.l+cW/2,PAD.t+cH+28);
  ctx.save();ctx.translate(12,PAD.t+cH/2);ctx.rotate(-Math.PI/2);ctx.fillText('하류 가격 변화율',0,0);ctx.restore();

  scatterScreenPos=[];
  pts.forEach(p=>{
    const x=xS(p.up),y=yS(p.dn);
    if(p.anom){
      const a=p.anom;const col=CONF_COLOR[a.conf];
      const r=a.conf==='high'?8:a.conf==='mid'?6:4.5;
      const isHov=hoveredAnomaly===a,isSel=selectedAnomaly===a;
      if(a.conf==='high'||isHov){
        const g=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
        g.addColorStop(0,col+'55');g.addColorStop(1,col+'00');
        ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      }
      ctx.beginPath();ctx.arc(x,y,isHov||isSel?r*1.4:r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      if(isHov||isSel){ctx.beginPath();ctx.arc(x,y,r*1.6,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();}
      scatterScreenPos.push({a,x,y,r:r+5});
    } else {
      ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='rgba(60,80,100,.4)';ctx.fill();
    }
  });
}

// ── IRF MINI CANVAS ───────────────────────────
function drawIRF(canvasId,anomaly){
  const canvas=document.getElementById(canvasId);if(!canvas) return;
  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  const ctx=canvas.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(9,9,15,0)';ctx.fillRect(0,0,W,H);

  const baseIRF=[0,0.32,0.71,0.91,0.83,0.64,0.44,0.28,0.15,0.07];
  const postIRF=anomaly.conf==='high'
    ?[0,0.51,0.94,1.22,1.07,0.77,0.48,0.26,0.12,0.05]
    :[0,0.38,0.82,0.97,0.87,0.69,0.48,0.30,0.16,0.08];
  const n=baseIRF.length;
  const PAD={l:28,r:8,t:10,b:22};
  const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
  const xS=i=>PAD.l+i/(n-1)*cW;
  const yS=v=>PAD.t+cH-(v/1.3)*cH;

  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=0.5;
  [0,0.5,1.0].forEach(v=>{
    ctx.beginPath();ctx.moveTo(PAD.l,yS(v));ctx.lineTo(PAD.l+cW,yS(v));ctx.stroke();
    ctx.fillStyle='#2a2a3a';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),PAD.l-4,yS(v)+3);
  });
  ctx.fillStyle='#2a2a3a';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
  [0,3,6,9].forEach(i=>ctx.fillText(i,xS(i),PAD.t+cH+12));

  // baseline
  ctx.beginPath();ctx.moveTo(xS(0),yS(baseIRF[0]));
  for(let i=1;i<n;i++){const x0=xS(i-1),y0=yS(baseIRF[i-1]),x1=xS(i),y1=yS(baseIRF[i]);ctx.bezierCurveTo(x0+(x1-x0)/2,y0,x0+(x1-x0)/2,y1,x1,y1);}
  ctx.strokeStyle='#4a8fd4';ctx.lineWidth=1.5;ctx.stroke();

  // post
  ctx.beginPath();ctx.moveTo(xS(0),yS(postIRF[0]));
  for(let i=1;i<n;i++){const x0=xS(i-1),y0=yS(postIRF[i-1]),x1=xS(i),y1=yS(postIRF[i]);ctx.bezierCurveTo(x0+(x1-x0)/2,y0,x0+(x1-x0)/2,y1,x1,y1);}
  ctx.strokeStyle='#e24b4a';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);

  // peak line on postIRF
  const pk=postIRF.indexOf(Math.max(...postIRF));
  ctx.beginPath();ctx.moveTo(xS(pk),PAD.t);ctx.lineTo(xS(pk),PAD.t+cH);
  ctx.strokeStyle='rgba(226,75,74,.25)';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.stroke();ctx.setLineDash([]);
}

  <div class="sec" style="border-bottom:none;">
    <div class="sec-title">IRF 차트 — ${segLabel.split(' ')[0]} <span class="sec-toggle">▾</span></div>
    <div class="irf-legend">
      <span class="il"><span class="il-line" style="background:#4a8fd4;"></span>전체 기간</span>
      <span class="il"><span class="il-line" style="background:#e24b4a;border-top:1.5px dashed #e24b4a;"></span>${a.year} 이후</span>
    </div>
    <div class="irf-canvas-wrap"><canvas id="irf-c" style="width:100%;height:100%;"></canvas></div>
  </div>`;

  setTimeout(()=>drawIRF('irf-c',a),50);
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  selectedAnomaly=null;
  if(currentView==='stream') drawStream(animProgress);
  else drawScatter(scatterSeg);
}

function copyUrl(){
  if(selectedAnomaly){
    const u=`${location.origin}${location.pathname}?anom=${selectedAnomaly.year}-${selectedAnomaly.month}-${selectedAnomaly.seg}`;
    navigator.clipboard.writeText(u).catch(()=>{});
  }
}
function addCompare(){}

// ── ANIMATION ────────────────────────────────
function animateStream(){
  if(animFrame) cancelAnimationFrame(animFrame);
  animProgress=0;
  const dur=1200,start=performance.now();
  function step(now){
    const t=Math.min(1,(now-start)/dur);
    animProgress=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    drawStream(animProgress);
    if(t<1) animFrame=requestAnimationFrame(step);
  }
  animFrame=requestAnimationFrame(step);
}

// ── VIEW SWITCH ───────────────────────────────
function switchView(v,el){
  currentView=v;
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  sc.style.display=v==='stream'?'block':'none';
  xc.style.display=v==='scatter'?'block':'none';
  hoveredAnomaly=null;
  buildSegLegend();
  if(v==='stream') animateStream();
  else{scatterData=null;drawScatter(scatterSeg);}
}

function buildSegLegend(){
  const sl=document.getElementById('seg-legend');
  if(currentView==='scatter'){
    sl.innerHTML=['A','B','D'].map(s=>`<button onclick="setScatterSeg('${s}')" style="font-size:10px;padding:3px 9px;border-radius:6px;border:0.5px solid rgba(255,255,255,${scatterSeg===s?'.15':'.07'});background:${scatterSeg===s?'rgba(255,255,255,.1)':'transparent'};color:${scatterSeg===s?'#d0cec8':'#444'};cursor:pointer;font-family:inherit;">구간 ${s==='D'?'D′':s}</button>`).join('');
  } else {
    sl.innerHTML=['A','B','D'].map(s=>`<div class="sleg"><div class="sline" style="background:${SEG_COLOR[s]};"></div>구간 ${s==='D'?'D′':s}</div>`).join('');
  }
}

function setScatterSeg(s){scatterSeg=s;scatterData=null;buildSegLegend();drawScatter(s);}

// ── COMMODITY ─────────────────────────────────
function buildCommDrop(){
  const d=document.getElementById('comm-drop');
  d.innerHTML=COMMS.map(c=>`<div class="ci${c.id===currentComm?' active':''}" onclick="selectComm('${c.id}','${c.name}')"><span>${c.name}</span><span class="cdot" style="background:${c.confHigh?'#e24b4a':c.anom?'#ef9f27':'#1e2a36'};"></span></div>`).join('');
}
function toggleComm(){commOpen=!commOpen;buildCommDrop();document.getElementById('comm-drop').classList.toggle('open',commOpen);}
function selectComm(id,name){
  currentComm=id;commOpen=false;
  document.getElementById('comm-drop').classList.remove('open');
  document.getElementById('comm-name').textContent=name;
  streamData=null;scatterData=null;
  buildCommDrop();closePanel();
  if(currentView==='stream') animateStream();
  else drawScatter(scatterSeg);
}
document.addEventListener('click',e=>{
  if(commOpen&&!e.target.closest('#comm-btn')&&!e.target.closest('#comm-drop')){
    commOpen=false;document.getElementById('comm-drop').classList.remove('open');
  }
});

// ── MOUSE ─────────────────────────────────────
function getCanvas(){return currentView==='stream'?sc:xc;}
function getPos(e){const r=getCanvas().getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function findHit(mx,my){
  const pool=currentView==='stream'?anomalyScreenPos:scatterScreenPos;
  for(const p of pool) if(Math.hypot(mx-p.x,my-p.y)<p.r+2) return p.a;
  return null;
}

function onMove(e){
  const{x,y}=getPos(e);
  const hit=findHit(x,y);
  const tip=document.getElementById('tip');
  if(hit){
    hoveredAnomaly=hit;
    getCanvas().style.cursor='pointer';
    const col=CONF_COLOR[hit.conf];
    document.getElementById('tip-badge').textContent={high:'고신뢰 이상',mid:'중신뢰 이상',ref:'참고 이상'}[hit.conf];
    document.getElementById('tip-badge').style.cssText=`font-size:10px;font-weight:600;border-radius:7px;padding:2px 7px;display:inline-block;margin-bottom:3px;color:${col};background:${col}22;`;
    document.getElementById('tip-title').textContent=hit.label+' · '+hit.year+'년 '+hit.month+'월';
    document.getElementById('tip-body').textContent=hit.short;
    const wrap=document.getElementById('chart-wrap');
    const wrect=wrap.getBoundingClientRect();
    tip.style.display='block';
    tip.style.left=(e.clientX-wrect.left+14)+'px';
    tip.style.top=(e.clientY-wrect.top-14)+'px';
  } else {
    hoveredAnomaly=null;
    getCanvas().style.cursor='crosshair';
    tip.style.display='none';
  }
  if(currentView==='stream') drawStream(animProgress);
  else drawScatter(scatterSeg);
}

function onClick(e){
  const{x,y}=getPos(e);
  const hit=findHit(x,y);
  if(hit) openPanel(hit);
}

sc.addEventListener('mousemove',onMove);sc.addEventListener('click',onClick);
xc.addEventListener('mousemove',onMove);xc.addEventListener('click',onClick);
document.getElementById('chart-wrap').addEventListener('mouseleave',()=>{
  hoveredAnomaly=null;document.getElementById('tip').style.display='none';
  if(currentView==='stream') drawStream(animProgress);else drawScatter(scatterSeg);
});

// ── INIT ──────────────────────────────────────
resizeCanvases();
buildSegLegend();
animateStream();
</script>
